server:
  port: 8080
  servlet:
    context-path: /api

spring:
  # 数据源配置 - 默认使用H2内存数据库（开发环境），生产环境切换为MySQL
  profiles:
    active: dev

  # H2 数据库配置（开发环境）
  datasource:
    driver-class-name: org.h2.Driver
    url: jdbc:h2:mem:smart_recipe;DB_CLOSE_DELAY=-1;MODE=MySQL
    username: sa
    password:

  # H2 控制台（开发环境可访问 /api/h2-console）
  h2:
    console:
      enabled: true
      path: /h2-console

  # Jackson 配置
  jackson:
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: Asia/Shanghai

# MyBatis-Plus 配置
mybatis-plus:
  mapper-locations: classpath:mapper/*.xml
  type-aliases-package: com.smartrecipe.entity
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  global-config:
    db-config:
      id-type: auto
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0

# JWT 配置
jwt:
  secret: smart-recipe-secret-key-2024-must-be-at-least-256-bits-long-for-hs256
  expiration: 86400000  # 24小时（毫秒）

# 日志配置
logging:
  level:
    com.smartrecipe: debug
    org.springframework: info
