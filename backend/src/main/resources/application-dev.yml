# 开发环境配置 - 使用 H2 内存数据库，无需安装 MySQL
spring:
  datasource:
    driver-class-name: org.h2.Driver
    url: jdbc:h2:mem:smart_recipe;DB_CLOSE_DELAY=-1;MODE=MySQL
    username: sa
    password:
  h2:
    console:
      enabled: true
      path: /h2-console
  sql:
    init:
      mode: always
      schema-locations: classpath:schema.sql
      data-locations: classpath:data.sql
